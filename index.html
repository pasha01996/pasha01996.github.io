<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="table_conteiner" id="tableConteiner">
        
    </div>


    <div id="conteiner">
        <form class="form form__sign_in not_active" id="formSingIn" action="#">

            <h2 class="form__heading">Welcome</h2>

                <input class="form__input form__input_sign_in_email" id="emailSingIn" type="email" placeholder="Email">
                <div class="form__input_conteiner">
                    <input class="form__input form__input_sign_in_password" id="passwordSingIn" type="password" placeholder="Password">
                    <button class="form__button_password_viewer" data-viewer-password></button>
                </div>

                <button class="form__button_forgot" id="buttonForgotPass" href="#">Forgot password?</button>

                <button class="form__button form__button_sign_in" id="buttonConfirmSingIn">Log in</button>
                <span class="form__border">Or</span>
                <div>
                    <button class="form__button form__button_google">Google</button>
                    <button class="form__button form__button_github">GitHub</button>
                </div>
                <span class="form__span">Have no account yet?</span>
                <button class="form__button form__button_switch" id="button2" data-switch-form>Sign up</button>
        </form>


        <form class="form form__sign_up " id="formSingUp" action="#">

            <h2 class="form__heading">Welcome</h2>

                <input class="form__input form__input_sign_up_email" id="emailSingUp" type="email" placeholder="Email">
                <div class="form__input_conteiner">
                    <input class="form__input form__input_sign_up_password" id="passwordSingUp" type="password" placeholder="Password">
                    <button class="form__button_password_viewer" data-viewer-password></button>
                </div>
                <input class="form__input form__input_sign_up_phone" id="phoneSignUp" type="tel" placeholder="Phone">
                <input class="form__input form__input_sign_up_country" id="citySignUp" type="text" placeholder="Country">


                <button class="form__button form__button_sign_up" id="buttonConfirmSingUp">Registration</button>
                <span class="form__span">Have an account?</span>
                <button class="form__button form__button_switch" id="button1" data-switch-form>Sign in</button>
        </form>

        <div class="modal" id="modalConteiner">
            <div class="modal__content" id="modalContent">
                    <span class="modal__text" id="modalText"></span>
            </div>
        </div>

    </div>

    <script type="module" src="./js/index.js"></script>
</body>
</html>
