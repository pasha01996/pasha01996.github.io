<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="table__signup_users" id="table-users">
        
    </div> 

    
    <div class="form__wrapper">


        <div class="form__container not_active" id="form-container-signup">
            <h2 class="form__title">Welcome</h2>

            <form class="form__signup" id="form-signup" action="/js/Form.js" method="post">
                <input class="form__input input__signup_email" id="inputEmailSignup" type="email" name="email" placeholder="Email">
                <div class="form__signup_password_wrap">
                    <input class="form__input input__signup_password" id="inputPassSignup" type="password" name="password" placeholder="Password">
                    <button class="form__button_password_viewer"></button>
                </div>
                <input class="form__input input__signup_phone" id="inputPhoneSignup" type="tel" name="phone" placeholder="Phone">
                <input class="form__input input__signup_country" id="inputCountrySignup" type="text" name="country" placeholder="Country">
                <input class="form__button input__signup_submit" id="inputSubmitSignup" type="submit" value="Registration">
            </form>

            <span class="form__text">Have an account?</span>
            <button class="form__button form__button_switch" id="switch-signup">Sign in</button>
        </div>



        <div class="form__container " id="form-container-signin">
            <h2 class="form__title">Welcome</h2>

            <form class="form__signin" id="form-signin" action="#">
                <input class="form__input input__signin_email" id="inputEmailSignin" type="email" name="email" placeholder="Email" id="email">
                <div class="form__signup_password_wrap">
                    <input class="form__input input__signin_password" id="inputPassSignin" type="password" name="password" placeholder="Password">
                    <button class="form__button_password_viewer"></button>
                </div>
                <input class="form__button input__signin_submit" id="inputSubmitSignin" type="submit" value="Log in">
            </form>

            <span class="form__border">Or</span>
            <div>
                <button class="form__button form__button_google">Google</button>
                <button class="form__button form__button_github">GitHub</button>
            </div>
            <span class="form__text">Have no account yet?</span>
            <button class="form__button form__button_switch" id="switch-signin">Sign up</button>
        </div>

        <div class="modal" id="modalConteiner">
            <div class="modal__content" id="modalContent">
                    <span class="modal__text" id="modalText"></span>
                    <button class="modal__btn" id="modalBnt">close</button>
            </div>
        </div>

    </div>

    
    
    <script type="module" src="./js/script.js"></script>
    
</body>
</html>
